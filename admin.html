<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Dahlia Admin</title>
<meta name="theme-color" content="#6d28d9"/><meta name="apple-mobile-web-app-capable" content="yes"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<style>
:root{--bg:#f4f6fb;--sf:#fff;--sf2:#f7f8fc;--bd:#e2e7f0;--tx:#111827;--tx2:#6b7280;--tx3:#9ca3af;--ac:#6d28d9;--ac2:#7c3aed;--gn:#059669;--yw:#d97706;--rd:#dc2626;--blu:#2563eb;--r:12px;--f:'Outfit',system-ui,sans-serif;--m:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}::-webkit-scrollbar{display:none}
body{font-family:var(--f);background:var(--bg);color:var(--tx);display:flex;justify-content:center}
.app{width:100%;max-width:430px;min-height:100vh;background:var(--bg);position:relative}
/* Auth screens */
.auth-sc{width:100%;max-width:430px;min-height:100vh;margin:0 auto;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.auth-logo{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;box-shadow:0 8px 24px rgba(0,0,0,.1)}
.auth-logo svg{width:28px;height:28px;fill:#fff}
.auth-title{font-size:20px;font-weight:900;text-transform:uppercase;text-align:center}.auth-title span{color:var(--ac2)}
.auth-sub{font-size:12px;color:var(--tx3);text-align:center;margin-top:2px}
.auth-card{width:100%;background:var(--sf);border:1px solid var(--bd);border-radius:20px;padding:22px;margin-top:24px;box-shadow:0 4px 20px rgba(0,0,0,.04)}
.fg{margin-bottom:14px}.fg label{display:block;font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;padding:11px 14px;border-radius:var(--r);border:1.5px solid var(--bd);background:var(--sf2);font-size:14px;font-family:var(--f);color:var(--tx);outline:none;transition:.2s}
.fg input:focus,.fg select:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(109,40,217,.08)}
.fg textarea{resize:vertical;min-height:50px;font-family:var(--f)}
.fg .pw-wrap{position:relative}.fg .pw-wrap input{padding-right:44px}
.fg .pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);width:24px;height:24px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx3)}.fg .pw-eye svg{width:18px;height:18px;stroke:currentColor;fill:none}
.fg .rw{display:flex;gap:8px}.fg .rw>*{flex:1;min-width:0}
.btn-main{width:100%;padding:13px;border-radius:var(--r);border:none;font-size:14px;font-weight:800;cursor:pointer;font-family:var(--f);text-transform:uppercase;letter-spacing:.5px;color:#fff;transition:.15s}.btn-main:active{transform:scale(.97)}
.btn-main.purple{background:linear-gradient(135deg,var(--ac),var(--ac2));box-shadow:0 4px 16px rgba(109,40,217,.2)}
.btn-main.green{background:linear-gradient(135deg,#059669,#10b981);box-shadow:0 4px 16px rgba(5,150,105,.2)}
.auth-err{font-size:11px;color:var(--rd);font-weight:600;text-align:center;margin-top:10px;min-height:15px}
.auth-link{display:block;text-align:center;margin-top:12px;font-size:11px;color:var(--tx3);font-weight:600;text-decoration:underline;cursor:pointer;background:none;border:none;font-family:var(--f)}
.auth-hint{margin-top:14px;padding:10px;background:var(--sf2);border-radius:var(--r);border:1px solid var(--bd);font-size:10px;color:var(--tx3);display:flex;align-items:center;gap:6px}
.auth-hint svg{width:14px;height:14px;stroke:currentColor;fill:none;flex-shrink:0}
/* OTP Boxes */
.otp-row{display:flex;gap:6px;justify-content:center;margin-bottom:16px}
.otp-in{width:44px;height:56px;text-align:center;font-size:24px;font-weight:900;border-radius:var(--r);border:1.5px solid var(--bd);background:var(--sf2);outline:none;font-family:var(--f);transition:.2s}
.otp-in:focus{border-color:var(--gn);box-shadow:0 0 0 3px rgba(5,150,105,.1)}
.otp-sep{display:flex;align-items:center;font-size:18px;color:var(--bd);font-weight:700}
/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--sf);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:40}
.hdr-logo{display:flex;align-items:center;gap:8px}.hdr-logo .mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#ec4899,#8b5cf6);display:flex;align-items:center;justify-content:center}.hdr-logo .mark svg{width:16px;height:16px;fill:#fff}.hdr-logo .nm{font-size:14px;font-weight:900;text-transform:uppercase}.hdr-logo .nm span{color:var(--ac2)}
.hdr-r{display:flex;align-items:center;gap:6px}
.cur-sw{display:flex;border:1px solid var(--bd);border-radius:8px;overflow:hidden}.cur-b{padding:4px 8px;font-size:9px;font-weight:800;border:none;cursor:pointer;font-family:var(--f);transition:.15s;background:var(--sf2);color:var(--tx3)}.cur-b.on{background:var(--ac);color:#fff}
.av{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--ac),#ec4899);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff}
/* Firebase bar */
.fb-bar{display:flex;align-items:center;justify-content:center;gap:4px;padding:5px;font-size:9px;font-weight:700;background:var(--sf);border-bottom:1px solid var(--bd)}.fb-bar .dot{width:5px;height:5px;border-radius:50%}
/* Content */
.cnt{padding:14px 14px 100px}
.pg{display:none;animation:fi .25s}.pg.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* Nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--sf);border-top:1px solid var(--bd);display:flex;justify-content:space-around;padding:5px 4px calc(env(safe-area-inset-bottom,5px)+8px);z-index:40}
.nb{display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 10px;border:none;background:none;cursor:pointer;border-radius:8px;font-family:var(--f);transition:.15s;position:relative}.nb:active{transform:scale(.88)}.nb svg{width:18px;height:18px;stroke:var(--tx3);fill:none;stroke-width:1.8}.nb .nl{font-size:8px;font-weight:800;color:var(--tx3);text-transform:uppercase}.nb.on{background:rgba(109,40,217,.06)}.nb.on svg{stroke:var(--ac2)}.nb.on .nl{color:var(--ac2)}
.nb .bdg{position:absolute;top:0;right:2px;min-width:14px;height:14px;border-radius:7px;background:var(--rd);color:#fff;font-size:7px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 3px}
/* Cards */
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.scard{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:14px}
.scard .ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}.scard .ic svg{width:18px;height:18px;fill:none;stroke-width:1.8}
.scard .lb{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px}.scard .vl{font-size:20px;font-weight:900;margin-top:2px;font-family:var(--m)}
/* Status bars */
.st-bars{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:14px;margin-bottom:12px}.st-bar{display:flex;align-items:center;gap:8px;margin-bottom:6px}.st-bar:last-child{margin:0}.st-bar .sb-lb{font-size:10px;font-weight:700;width:55px;color:var(--tx2)}.st-bar .sb-wrap{flex:1;height:20px;background:var(--sf2);border-radius:6px;overflow:hidden}.st-bar .sb-fill{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;transition:width .5s}.st-bar .sb-val{font-size:9px;font-weight:800;color:#fff}
/* Revenue bars */
.rbars{display:flex;align-items:flex-end;gap:5px;height:100px;padding:14px;background:var(--sf);border:1px solid var(--bd);border-radius:16px;margin-bottom:12px}.rbar{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}.rbar .rf{width:100%;border-radius:4px 4px 0 0;min-height:3px;transition:height .5s}.rbar .rv{font-size:7px;font-weight:700;color:var(--tx3);font-family:var(--m)}.rbar .rl{font-size:7px;font-weight:700;color:var(--tx3)}
/* Wrap card */
.cw{background:var(--sf);border:1px solid var(--bd);border-radius:16px;overflow:hidden;margin-bottom:12px}
.cw-h{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--bd);flex-wrap:wrap;gap:6px}
.cw-t{font-size:13px;font-weight:800;text-transform:uppercase;display:flex;align-items:center;gap:4px}.cw-t svg{width:13px;height:13px;stroke:var(--ac2);fill:none}
/* List items */
.li{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid rgba(0,0,0,.03)}.li:last-child{border:none}.li:active{background:var(--sf2)}
.li-i{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;overflow:hidden}.li-i img{width:100%;height:100%;object-fit:cover}
.li-b{flex:1;min-width:0}.li-t{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.li-s{font-size:10px;color:var(--tx3);margin-top:1px}
.li-r{text-align:right;flex-shrink:0}.li-v{font-size:11px;font-weight:800;font-family:var(--m)}.li-d{font-size:9px;color:var(--tx3)}
.emp{text-align:center;padding:28px;color:var(--tx3);font-size:12px}
/* Badges */
.bg{padding:2px 7px;border-radius:5px;font-size:8px;font-weight:800;text-transform:uppercase;display:inline-flex}.bg.su{background:rgba(5,150,105,.07);color:var(--gn)}.bg.pe{background:rgba(217,119,6,.07);color:var(--yw)}.bg.fa{background:rgba(220,38,38,.06);color:var(--rd)}
/* Buttons */
.bt{padding:5px 10px;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer;font-family:var(--f);border:1px solid var(--bd);background:var(--sf);color:var(--tx2);display:flex;align-items:center;gap:3px;transition:.15s}.bt:active{transform:scale(.94)}.bt svg{width:10px;height:10px;stroke:currentColor;fill:none}
.bt.pr{background:var(--ac);color:#fff;border-color:var(--ac)}.bt.gn{background:var(--gn);color:#fff;border-color:var(--gn)}.bt.yw{background:var(--yw);color:#fff;border-color:var(--yw)}.bt.rd{background:var(--rd);color:#fff;border-color:var(--rd)}.bt.bl{background:var(--blu);color:#fff;border-color:var(--blu)}
.act{display:flex;gap:3px}.ab{width:28px;height:28px;border-radius:7px;border:1px solid var(--bd);background:var(--sf);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.1s}.ab:active{transform:scale(.88)}.ab svg{width:14px;height:14px;fill:none}
/* Section label */
.sec{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;margin:14px 0 8px;display:flex;align-items:center;gap:5px}.sec svg{width:13px;height:13px;stroke:var(--ac2);fill:none}
/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(3px);z-index:50;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:.2s}.mo.on{opacity:1;pointer-events:all}
.mc{background:var(--sf);border-radius:20px 20px 0 0;padding:8px 18px 24px;max-width:430px;width:100%;transform:translateY(100%);transition:transform .3s;max-height:88vh;overflow-y:auto}.mo.on .mc{transform:translateY(0)}
.m-handle{width:32px;height:3px;border-radius:3px;background:var(--bd);margin:0 auto 14px}
.mt{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.mt h3{font-size:15px;font-weight:900;text-transform:uppercase}
.mx{width:28px;height:28px;border-radius:8px;border:1px solid var(--bd);background:var(--sf);cursor:pointer;display:flex;align-items:center;justify-content:center}.mx svg{width:13px;height:13px;stroke:var(--tx2);fill:none}
.mf{display:flex;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--bd)}.mb{flex:1;padding:12px;border-radius:var(--r);font-size:13px;font-weight:800;cursor:pointer;font-family:var(--f);border:none;text-transform:uppercase}.mb:active{transform:scale(.96)}.mb.sv{background:var(--ac);color:#fff}.mb.cn{background:var(--sf2);color:var(--tx2);border:1px solid var(--bd)}.mb.dl{background:var(--rd);color:#fff}
/* Info rows */
.mr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(0,0,0,.03)}.mr:last-child{border:none}.mr .ml{font-size:11px;color:var(--tx3);font-weight:600}.mr .mv{font-size:12px;font-weight:700}
/* Image upload */
.img-up{width:100%;height:100px;border:2px dashed var(--bd);border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:var(--sf2);overflow:hidden;position:relative}.img-up:active{border-color:var(--ac)}.img-up img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}.img-up svg{width:24px;height:24px;stroke:var(--tx3);fill:none}.img-up span{font-size:10px;color:var(--tx3);font-weight:600;margin-top:2px}
/* Package list */
.pkl{display:flex;flex-direction:column;gap:6px;margin-top:6px}.pkr{display:flex;gap:6px;align-items:center}.pkr input{flex:1;padding:8px 10px;border-radius:8px;border:1px solid var(--bd);background:var(--sf2);font-size:12px;font-family:var(--f);color:var(--tx);outline:none}.pkrm{width:28px;height:28px;border-radius:6px;border:1px solid var(--bd);background:none;cursor:pointer;color:var(--rd);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700}
.pka{width:100%;padding:8px;border-radius:8px;border:1px dashed var(--bd);background:none;cursor:pointer;font-size:11px;font-weight:700;color:var(--ac2);font-family:var(--f);margin-top:4px;text-align:center}
/* Settings */
.stc{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:14px;margin-bottom:10px}
.stc-t{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;margin-bottom:10px;display:flex;align-items:center;gap:4px;color:var(--ac2)}.stc-t svg{width:12px;height:12px;stroke:currentColor;fill:none}
.str{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(0,0,0,.03);flex-wrap:wrap;gap:4px}.str:last-child{border:none}
.stl{font-size:12px;font-weight:700}.sts{font-size:9px;color:var(--tx3)}
.sti{padding:7px 10px;border-radius:8px;border:1px solid var(--bd);font-size:12px;font-family:var(--f);color:var(--tx);outline:none;background:var(--sf2);width:100%}
.tgl{position:relative;width:38px;height:22px;cursor:pointer;flex-shrink:0}.tgl input{opacity:0;width:0;height:0}.tgl .ts{position:absolute;inset:0;background:var(--bd);border-radius:22px;transition:.3s}.tgl .ts::before{content:'';position:absolute;left:2px;bottom:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:.3s}.tgl input:checked+.ts{background:var(--ac)}.tgl input:checked+.ts::before{transform:translateX(16px)}
/* Receipt */
.rcp-img{width:100%;border-radius:var(--r);border:1px solid var(--bd);overflow:hidden;margin:8px 0}.rcp-img img{width:100%;display:block}
.rcp-none{padding:14px;text-align:center;color:var(--tx3);font-size:11px;background:var(--sf2);border-radius:var(--r);border:1px dashed var(--bd);margin:8px 0}
/* Toast */
.tst{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-10px);padding:12px 18px;border-radius:var(--r);font-size:12px;font-weight:700;z-index:200;opacity:0;transition:.3s;box-shadow:0 8px 28px rgba(0,0,0,.15);max-width:88%;display:flex;align-items:center;gap:8px}.tst.v{opacity:1;transform:translateX(-50%) translateY(0)}.tst.ok{background:var(--gn);color:#fff}.tst.er{background:var(--rd);color:#fff}.tst.in{background:var(--blu);color:#fff}
/* QR Section */
.qr-wrap{display:flex;justify-content:center;margin:10px 0}.qr-wrap img{width:160px;height:160px;border-radius:12px;border:1px solid var(--bd)}
.secret-row{display:flex;gap:6px;align-items:center;margin:8px 0}.secret-row code{flex:1;padding:8px 10px;background:var(--sf2);border-radius:8px;font-size:11px;font-family:var(--m);font-weight:700;color:var(--tx);user-select:all}
/* PWA */
.pwa-btn{width:100%;padding:12px;border-radius:var(--r);border:1.5px solid var(--ac);background:rgba(109,40,217,.04);color:var(--ac);font-size:12px;font-weight:800;cursor:pointer;font-family:var(--f);text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px}.pwa-btn:active{transform:scale(.96)}.pwa-btn svg{width:14px;height:14px;stroke:currentColor;fill:none}
</style></head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="adminAuth" class="auth-sc">
  <div><div class="auth-logo" style="background:linear-gradient(135deg,#ec4899,#8b5cf6)"><svg viewBox="0 0 24 24"><path d="M12 2a4 4 0 014 4c0 1.1-.45 2.1-1.17 2.83A4 4 0 0118 8a4 4 0 01-1.17 2.83A4 4 0 0118 14a4 4 0 01-4 4 4 4 0 01-4-4 4 4 0 011.17-2.83A4 4 0 016 14a4 4 0 011.17-2.83A4 4 0 116 8a4 4 0 014-4 4 4 0 012-4zm0 6a2 2 0 100 4 2 2 0 000-4z"/></svg></div>
  <div class="auth-title"><span>Dahlia</span> Admin</div><div class="auth-sub">Dashboard Login</div></div>
  <div class="auth-card">
    <div class="fg"><label>Username</label><input id="adEm" type="text" placeholder="e.g. Dahlia28"/></div>
    <div class="fg"><label>Password</label><div class="pw-wrap"><input id="adPw" type="password" placeholder="Enter password"/><button class="pw-eye" onclick="togglePw('adPw',this)" type="button"><svg viewBox="0 0 24 24" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
    <button class="btn-main purple" onclick="adLogin()">Sign In</button>
    <div id="adErr" class="auth-err"></div>
    <div style="display:flex;gap:6px;margin-top:14px">
      <button onclick="quickLogin('Dahlia28')" style="flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--ac);background:rgba(109,40,217,.04);color:var(--ac);font-size:11px;font-weight:800;cursor:pointer;font-family:var(--f)">Dahlia28</button>
      <button onclick="quickLogin('Raycod28')" style="flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--blu);background:rgba(37,99,235,.04);color:var(--blu);font-size:11px;font-weight:800;cursor:pointer;font-family:var(--f)">Raycod28</button>
    </div>
  </div>
</div>

<!-- ═══ 2FA ═══ -->
<div id="twoFaScreen" class="auth-sc" style="display:none">
  <div><div class="auth-logo" style="background:linear-gradient(135deg,#059669,#06b6d4)"><svg viewBox="0 0 24 24" style="fill:none;stroke:#fff;stroke-width:1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/><circle cx="12" cy="16" r="1"/></svg></div>
  <div class="auth-title">2FA Verify</div><div class="auth-sub">Enter code from Google Authenticator</div></div>
  <div class="auth-card">
    <div class="otp-row">
      <input class="otp-in" maxlength="1" inputmode="numeric" oninput="otpNav(this,0)" onkeydown="otpDel(event,0)"/>
      <input class="otp-in" maxlength="1" inputmode="numeric" oninput="otpNav(this,1)" onkeydown="otpDel(event,1)"/>
      <input class="otp-in" maxlength="1" inputmode="numeric" oninput="otpNav(this,2)" onkeydown="otpDel(event,2)"/>
      <div class="otp-sep">–</div>
      <input class="otp-in" maxlength="1" inputmode="numeric" oninput="otpNav(this,3)" onkeydown="otpDel(event,3)"/>
      <input class="otp-in" maxlength="1" inputmode="numeric" oninput="otpNav(this,4)" onkeydown="otpDel(event,4)"/>
      <input class="otp-in" maxlength="1" inputmode="numeric" oninput="otpNav(this,5)" onkeydown="otpDel(event,5)"/>
    </div>
    <button class="btn-main green" onclick="verify2FA()">Verify Code</button>
    <div id="tfaErr" class="auth-err"></div>

function rUsers(){
  var um={};O.forEach(function(o){var u=o.authUser||o.userId||"guest";if(!um[u])um[u]={id:u,did:o.dahliaId||"",nm:o.authName||"",uid:o.userId||"",cnt:0,sp:0,last:o.timestamp,games:{},gameIds:[]};um[u].cnt++;if(o.status==="success")um[u].sp+=o.price;um[u].games[o.game]=1;if(o.userId&&um[u].gameIds.indexOf(o.userId)===-1)um[u].gameIds.push(o.userId);if(o.timestamp>um[u].last)um[u].last=o.timestamp;if(o.dahliaId)um[u].did=o.dahliaId;if(o.authName)um[u].nm=o.authName;});

var pendingSecret="";
function rSet(){var tfs=twoFaEnabled?'<span class="bg su" style="font-size:10px">Active</span>':'<span class="bg" style="font-size:10px;background:var(--sf2)">Off</span>';var h='<div class="stc"><div class="stc-t" style="color:var(--gn)"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>2FA — Google Authenticator</div><div class="str"><div><div class="stl">Status</div></div>'+tfs+'</div>';if(!twoFaEnabled){h+='<div class="str" style="flex-direction:column;align-items:stretch"><div class="stl" style="margin-bottom:6px">Setup 2FA</div><div style="font-size:10px;color:var(--tx3);margin-bottom:8px">1. Install Google Authenticator<br/>2. Generate Secret below<br/>3. Scan QR code<br/>4. Enter code to activate</div><button class="bt gn" style="width:100%;justify-content:center" onclick="setup2FA()">Generate Secret Key</button></div><div id="tfaSetup" style="display:none"><div class="stl" style="margin:8px 0 4px">Secret Key</div><div class="secret-row"><code id="tfaSecret"></code><button class="bt" onclick="navigator.clipboard.writeText(document.getElementById(\'tfaSecret\').textContent);toast(\'Copied\',\'ok\')">Copy</button></div><div class="stl" style="margin-bottom:4px">QR Code</div><div class="qr-wrap"><img id="tfaQR"/></div><div class="stl" style="margin:8px 0 4px">Verify to Activate</div><div style="display:flex;gap:6px"><input id="tfaVerify" placeholder="6-digit code" maxlength="6" inputmode="numeric" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--bd);font-size:14px;font-family:var(--m);outline:none"/><button class="bt gn" onclick="activate2FA()">Activate</button></div><div id="tfaSetupErr" class="auth-err"></div></div>';}else{h+='<div class="str"><div><div class="stl">Disable 2FA</div></div><button class="bt rd" onclick="disable2FA()">Disable</button></div>';}
h+='</div><div class="stc"><div class="stc-t">Store</div><div class="str"><div class="stl">Name</div><input class="sti" value="'+CFG.name+'" onchange="CFG.name=this.value;svC()"/></div><div class="str"><div class="stl">Currency</div><input class="sti" value="'+CFG.cur+'" style="width:80px" onchange="CFG.cur=this.value;svC()"/></div><div class="str"><div><div class="stl">Auto-Approve</div></div><label class="tgl"><input type="checkbox" '+(CFG.autoApprove?"checked":"")+' onchange="CFG.autoApprove=this.checked;svC()"/><span class="ts"></span></label></div></div>';
h+='<div class="stc"><div class="stc-t">Notifications</div><div class="str"><div class="stl">Sound</div><label class="tgl"><input type="checkbox" '+(sndEnabled?"checked":"")+' onchange="sndEnabled=this.checked"/><span class="ts"></span></label></div><div class="str"><div class="stl">Test</div><button class="bt bl" onclick="playAlert();toast(\'Played\',\'ok\')">Play</button></div></div>';
h+='<div class="stc"><div class="stc-t" style="color:var(--blu)">Telegram</div><div class="str" style="flex-direction:column;align-items:stretch"><div class="stl">Bot Token</div><input class="sti" value="'+TG_BOT+'" placeholder="123456:ABC..." onchange="TG_BOT=this.value"/></div><div class="str" style="flex-direction:column;align-items:stretch"><div class="stl">Chat ID</div><input class="sti" value="'+TG_CHAT+'" placeholder="-100123..." onchange="TG_CHAT=this.value"/></div><div class="str"><div class="stl">Test</div><button class="bt bl" onclick="sendTgNotify(\'Test!\');toast(\'Sent\',\'ok\')">Send</button></div></div>';
h+='<div class="stc"><div class="stc-t">Firebase</div><div class="str"><div class="stl">'+FC.projectId+'</div><span class="bg '+(fb?"su":"fa")+'" style="font-size:10px">'+(fb?"Online":"Offline")+'</span></div><div class="str"><div class="stl">Sync</div><button class="bt pr" onclick="syncAll()">Sync All</button></div></div>';
h+='<div class="stc"><div class="stl" style="color:var(--tx3)">Dahlia Admin v3.0</div><div style="font-size:9px;color:var(--tx3)">Firebase • 2FA • PWA</div><button class="pwa-btn" onclick="installPWA()"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Install App</button></div>';document.getElementById("pg-set").innerHTML=h;}
function setup2FA(){pendingSecret=genSecret();document.getElementById("tfaSetup").style.display="block";document.getElementById("tfaSecret").textContent=pendingSecret;var uri="otpauth://totp/DahliaAdmin:"+(adAuth&&adAuth.currentUser?adAuth.currentUser.email:"admin")+"?secret="+pendingSecret+"&issuer=DahliaAdmin&digits=6&period=30";document.getElementById("tfaQR").src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data="+encodeURIComponent(uri);}
async function activate2FA(){var code=document.getElementById("tfaVerify").value.replace(/\s/g,"");if(code.length!==6){document.getElementById("tfaSetupErr").textContent="Enter 6 digits";return;}try{var now=Math.floor(Date.now()/1000),valid=false;for(var w=-1;w<=1;w++){if(code===await genTOTP(pendingSecret,now+w*30)){valid=true;break;}}if(valid){TOTP_SECRET=pendingSecret;twoFaEnabled=true;if(fb)db.collection("config").doc("2fa").set({enabled:true,secret:TOTP_SECRET});toast("2FA Active!","ok");rSet();}else{document.getElementById("tfaSetupErr").textContent="Wrong code";}}catch(e){document.getElementById("tfaSetupErr").textContent="Error";}}
